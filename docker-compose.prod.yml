services:
  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: tabla-baki-backend
    ports:
      - "127.0.0.1:8000:4444"
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=4444
      - CORS_ORIGINS=https://tablabaki.com,https://www.tablabaki.com
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: tabla-baki-frontend
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3