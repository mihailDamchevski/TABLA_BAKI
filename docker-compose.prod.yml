# Production: bind to localhost only. Host nginx proxies:
#   /     -> 127.0.0.1:6969  (frontend container nginx)
#   /api/ -> 127.0.0.1:4444/ (FastAPI)
# Cloudflare Tunnel: ingress service http://localhost:80 → host nginx.

services:
  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: tabla-baki-backend
    ports:
      - "127.0.0.1:4444:4444"
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=4444
      - CORS_ORIGINS=${CORS_ORIGINS:-https://tablabaki.com,https://www.tablabaki.com}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4444/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: tabla-baki-frontend
    ports:
      - "127.0.0.1:6969:6969"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:6969/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
