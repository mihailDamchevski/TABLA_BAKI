# Local dev: open http://localhost:3000 — API calls go to host port 8000 (mapped to backend).

services:
  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: tabla-baki-backend
    ports:
      - "8000:4444"
    volumes:
      - ./api:/app
      - /app/__pycache__
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=4444
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4444/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: tabla-baki-frontend
    ports:
      - "3000:6969"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:6969/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
